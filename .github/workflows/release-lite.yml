# Publishes savestate-lite-<tag>.zip (contents: addons/savestate/) when you publish a GitHub Release.
name: Release Lite ZIP

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  zip-lite:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Zip addons/savestate
        run: |
          TAG="${{ github.event.release.tag_name }}"
          zip -r "savestate-lite-${TAG}.zip" addons/savestate/

      - name: Upload zip to release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.event.release.tag_name }}"
          gh release upload "$TAG" "savestate-lite-${TAG}.zip" --clobber
